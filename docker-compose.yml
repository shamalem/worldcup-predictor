services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: worldcup
      POSTGRES_PASSWORD: worldcup
      POSTGRES_DB: worldcup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://worldcup:worldcup@db:5432/worldcup
      CORS_ORIGINS: http://localhost,http://localhost:5173
    volumes:
      # Mount trained artifacts so you don't rebuild the image after training.
      - ./backend/artifacts:/app/artifacts
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
